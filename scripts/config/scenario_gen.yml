  - Real-time remote biometric identification (Not prohibited if: The AI system conducts targeted searches for victims of abduction, human trafficking, sexual exploitation, or missing persons, only when strictly necessary OR The AI system assists in preventing imminent threats to life, physical safety, or foreseeable terrorist attacks, provided its use is strictly necessary OR The AI system facilitates the localisation or identification of criminal suspects for investigation, prosecution, or execution of serious criminal penalties, under strictly necessary conditions.)

