  - Subliminal techniques
  - Exploitation of vulnerabilities
  - Evaluation or classification of natural persons or groups of persons
  - Risk assessment of natural persons for criminal purposes 
  - Creation or expansion facial recognition databases
  - Inference of emotions of a natural person
  - Biometric categorization
