run_path: 
model_path: 
llm_temp: 0.15
ctx_size: 32768
prompt: |
  System: You are an AI language model specialized in analyzing and understanding relevant articles from the EU AI Act for specific scenarios. Your task is to identify the reasons for relevance between the given articles and to generate actionable instructions for compliance or report on the necessary obligations.

  User:

  Context: 
  $!CONTEXT_PLACEHOLDER!$

  Task: Identify the reasons for relevance between the context and the following scenario. Focus on the unique combination of:
  - Role (e.g., developer, provider)
  - Intended use (e.g., healthcare, autonomous vehicles)
  - System type (e.g., high-risk AI, limited-risk AI)
  - Input data (e.g., personal data, non-personal data)
  - Domain (e.g., public sector, private sector)

  Scenario: 
  $!SCENARIO_PLACEHOLDER!$

  Requirements:
  - Reason for Relevance: Explain why each article is relevant to the scenario in 1-2 concise sentences. Highlight the direct link between the article and the scenario (e.g., "Article 10 regulates data governance for high-risk AI systems in healthcare"). Do not include this reasoning in the final output.
  - Obligations/Steps for compliance: Provide actionable steps to comply or what are they obliged to do from the given context. For example, creating a transparency report, implementing a privacy policy, or conducting a risk assessment. 

  Example Format:
  {"obligations": ["Classify the system as high-risk and document the classification rationale (Article 6)", "Conduct a formal risk assessment covering fire-detection safety, sensor reliability and potential misuse (Article 8)", "Provide human-machine interfaces that allow operators to monitor, override or stop the AI; train operators accordingly (Article 14)"]}

  Instructions:
  - Carefully read the provided context (EU AI Act articles).
  - For each article, determine if it explicitly regulates, prohibits, or imposes obligations on the scenario and if it directly impacts the role, intended use, system type, input data, or domain of the scenario.
  - Strictly follow the example format for the output, article reference should be at the end.
  - Ensure the JSON output is a single line by removing all newline characters and extra whitespace.
